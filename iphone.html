<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mecanismos de Infancia — Versión móvil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0b0b0c}
  .mi-screen-scroll::-webkit-scrollbar{width:0;display:none}
  .mi-screen-scroll{scrollbar-width:none}
  .mi-frame iframe{border:0;display:block;width:100%;height:100%;background:#F1EADB}
</style>
</head>
<body>

<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:36px 20px;background:radial-gradient(120% 80% at 50% 0%, #2b2b30 0%, #131316 55%, #0b0b0c 100%);font-family:Archivo,system-ui,sans-serif;">

  <div style="text-align:center;color:#F1EADB;">
    <div style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#E7A833;">VERSIÓN MÓVIL</div>
    <div style="font-family:Archivo;font-weight:900;font-size:26px;letter-spacing:-.03em;margin-top:4px;">Mecanismos de Infancia</div>
  </div>

  <!-- ===== iPhone ===== -->
  <div style="position:relative;width:404px;height:850px;background:linear-gradient(145deg,#3a3a40,#1a1a1d);border-radius:56px;padding:13px;box-shadow:0 50px 100px rgba(0,0,0,.55), inset 0 0 0 2px #4a4a50, 0 0 0 1px #000;">
    <!-- pantalla -->
    <div class="mi-frame" style="position:relative;width:100%;height:100%;border-radius:44px;overflow:hidden;background:#F1EADB;transform:translateZ(0);">

      <!-- isla dinámica -->
      <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:122px;height:34px;background:#000;border-radius:20px;z-index:120;pointer-events:none;"></div>

      <!-- barra de estado -->
      <div style="position:absolute;top:0;left:0;right:0;height:46px;z-index:110;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:#F1EADB;border-bottom:1px solid rgba(22,19,16,.08);pointer-events:none;">
        <span style="font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:#161310;letter-spacing:.02em;">9:41</span>
        <span style="display:flex;align-items:center;gap:7px;">
          <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" rx=".6" fill="#161310"/><rect x="5" y="5.5" width="3" height="6.5" rx=".6" fill="#161310"/><rect x="10" y="3" width="3" height="9" rx=".6" fill="#161310"/><rect x="15" y="0.5" width="3" height="11.5" rx=".6" fill="#161310"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none" stroke="#161310" stroke-width="1.6" stroke-linecap="round"><path d="M2 4.4C5.8 1.2 11.2 1.2 15 4.4"/><path d="M4.4 7C6.9 5 10.1 5 12.6 7"/><path d="M7 9.4 8.5 10.8 10 9.4"/></svg>
          <svg width="26" height="13" viewBox="0 0 26 13"><rect x="0.6" y="0.6" width="22" height="11.8" rx="3.2" fill="none" stroke="#161310" stroke-opacity=".4"/><rect x="2" y="2" width="17" height="9" rx="1.8" fill="#161310"/><rect x="24" y="4.2" width="1.8" height="4.6" rx=".9" fill="#161310" fill-opacity=".4"/></svg>
        </span>
      </div>

      <!-- scroll de la app (contiene la tienda real) -->
      <div class="mi-screen-scroll" style="position:absolute;top:46px;left:0;right:0;bottom:0;overflow:hidden;transform:translateZ(0);">
        <iframe src="./index.html" title="Mecanismos de Infancia" loading="eager"></iframe>
      </div>

      <!-- indicador home -->
      <div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:135px;height:5px;border-radius:5px;background:#161310;opacity:.55;z-index:120;pointer-events:none;"></div>
    </div>
  </div>

  <div style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;color:rgba(241,234,219,.5);text-align:center;max-width:360px;">
    Misma tienda, adaptada a pantalla de teléfono · desliza para explorar
  </div>
</div>
</body>
</html>
