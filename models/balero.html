<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Balero — modelo 3D</title>
<style>
  :root{
    --panel:rgba(16,21,28,.78); --line:rgba(255,255,255,.12);
    --txt:#e9eef3; --muted:#9fb0c0; --accent:#7fd1c7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:transparent;
    font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--txt)}
  #app{position:fixed;inset:0}
  canvas{display:block;touch-action:none}

  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:10;
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  body.compact .controls{display:none}
  button{
    font-family:inherit;font-size:11.5px;color:var(--txt);
    background:var(--panel);border:1px solid var(--line);border-radius:999px;
    padding:9px 14px;cursor:pointer;backdrop-filter:blur(10px);transition:.15s}
  button:hover{border-color:var(--accent);color:#fff}
  button.off{opacity:.55}
  .badge{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:6px;vertical-align:middle}
  button.off .badge{background:#5a6470}
</style>
</head>
<body>
<div id="app"></div>

<div class="controls">
  <button id="btnBag"><span class="badge"></span>Bolsa</button>
  <button id="btnRot"><span class="badge"></span>Girar</button>
  <button id="btnReset">Reiniciar vista</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   Balero en bolsa de celofán — Three.js r128
   Embebible: fondo transparente + modo compacto (?mode=compact)
   Unidades del mundo = milímetros
   ============================================================ */

const PARAMS = new URLSearchParams(location.search);
const COMPACT = PARAMS.get('mode') === 'compact';
if (COMPACT) document.body.classList.add('compact');

const app = document.getElementById('app');
let renderer, scene, camera;
let piece, bag, band, ground;
let envRTtex;

// --- estado de cámara (órbita manual) ---
const target = new THREE.Vector3(0, 0, 0);
const cam = { r:255, theta:0.18, phi:1.28 };      // valores actuales
const camGoal = { r:255, theta:0.18, phi:1.28 };  // objetivos (con suavizado)
const CAM_DEFAULT = { r:255, theta:0.18, phi:1.28 };
let autoRotate = true;

init();
buildScene();
animate();

/* ---------------- Setup base ---------------- */
function init(){
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);                 // transparente: deja ver el bloque de color de la tienda
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.12;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  app.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = null;                              // sin fondo opaco

  camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 1, 4000);

  // Entorno (reflejos para metal y celofán)
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  const envTex = new THREE.CanvasTexture(makeEnvCanvas());
  envTex.mapping = THREE.EquirectangularReflectionMapping;
  const rt = pmrem.fromEquirectangular(envTex);
  envRTtex = rt.texture;
  scene.environment = envRTtex;
  envTex.dispose();

  addLights();
  window.addEventListener('resize', onResize);
  bindControls();
}

/* ---------------- Iluminación ---------------- */
function addLights(){
  scene.add(new THREE.HemisphereLight(0xffffff, 0x3a4150, 0.55));

  const key = new THREE.DirectionalLight(0xffffff, 2.0);
  key.position.set(70, 150, 180);
  key.castShadow = true;
  key.shadow.mapSize.set(2048, 2048);
  key.shadow.camera.near = 40;
  key.shadow.camera.far = 600;
  const d = 120;
  key.shadow.camera.left=-d; key.shadow.camera.right=d;
  key.shadow.camera.top=d; key.shadow.camera.bottom=-d;
  key.shadow.bias = -0.0004;
  key.shadow.radius = 6;
  scene.add(key);

  const fill = new THREE.DirectionalLight(0xcdd9ff, 0.6);
  fill.position.set(-120, 60, -40);
  scene.add(fill);

  // glints para el celofán
  const g1 = new THREE.PointLight(0xffffff, 0.8, 800);
  g1.position.set(-60, 120, 90); scene.add(g1);
  const g2 = new THREE.PointLight(0xfff3e0, 0.6, 800);
  g2.position.set(70, -10, 120); scene.add(g2);
}

/* ---------------- Entorno (canvas) ---------------- */
function makeEnvCanvas(){
  const c=document.createElement('canvas'); c.width=1024; c.height=512;
  const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,512);
  g.addColorStop(0,'#cdd6e0'); g.addColorStop(0.5,'#9aa6b4'); g.addColorStop(1,'#566173');
  ctx.fillStyle=g; ctx.fillRect(0,0,1024,512);
  // "lámparas" suaves para reflejos especulares
  const blob=(x,y,r,a)=>{const rg=ctx.createRadialGradient(x,y,0,x,y,r);
    rg.addColorStop(0,`rgba(255,255,255,${a})`); rg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();};
  blob(250,120,150,0.9); blob(720,90,120,0.8); blob(520,260,90,0.5); blob(880,300,110,0.6);
  return c;
}

/* ---------------- Escena ---------------- */
function buildScene(){
  piece = makePiece();
  scene.add(piece);

  const bagMesh = makeBag();
  bag = bagMesh.bag; band = bagMesh.band;
  scene.add(bag); scene.add(band);

  // piso para sombra de contacto
  const gGeo = new THREE.PlaneGeometry(1400,1400);
  const gMat = new THREE.ShadowMaterial({opacity:0.22});
  ground = new THREE.Mesh(gGeo, gMat);
  ground.rotation.x = -Math.PI/2;
  ground.position.y = -66;
  ground.receiveShadow = true;
  scene.add(ground);
}

/* ----- Pieza: perfil revolucionado (LatheGeometry) ----- */
function makePiece(){
  const Rc = 14.0;     // cresta de rosca  -> Ø28
  const Rr = 12.2;     // raíz de rosca
  const pitch = 3.4;   // paso
  const topY = 70.0;
  const pts = [];

  // marca de centro (cara superior)
  pts.push(new THREE.Vector2(0.0, 69.0));   // fondo del puntito
  pts.push(new THREE.Vector2(0.9, 70.0));   // sube a la cara
  pts.push(new THREE.Vector2(13.0, 70.0));  // cara superior plana
  pts.push(new THREE.Vector2(14.0, 69.2));  // chaflán a la cresta

  // rosca exterior — perfil en V revolucionado
  let y = 69.2;
  while (y > 6.0){
    pts.push(new THREE.Vector2(Rr, y - pitch*0.5));
    pts.push(new THREE.Vector2(Rc, y - pitch));
    y -= pitch;
  }

  // base + cavidad cónica con pip central
  pts.push(new THREE.Vector2(14.0, 4.0));
  pts.push(new THREE.Vector2(14.0, 1.0));
  pts.push(new THREE.Vector2(13.0, 0.0));   // chaflán inferior
  pts.push(new THREE.Vector2(9.8, 0.0));    // cara anular inferior
  pts.push(new THREE.Vector2(9.6, 0.6));
  pts.push(new THREE.Vector2(9.5, 11.0));   // pared de la cavidad
  pts.push(new THREE.Vector2(3.2, 14.5));   // fondo cónico
  pts.push(new THREE.Vector2(1.0, 12.5));   // cono central
  pts.push(new THREE.Vector2(0.0, 8.5));    // punta del pip

  const geo = new THREE.LatheGeometry(pts, 160);
  geo.translate(0, -35, 0);                 // centrar
  geo.rotateZ(Math.PI/2);                   // acostar (eje a lo largo de X)
  geo.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    color:0x787e84, metalness:0.82, roughness:0.46,
    envMapIntensity:1.0, side:THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true; mesh.receiveShadow = true;
  return mesh;
}

/* ----- Bolsa plana de celofán (tipo OPP, almohada sellada) ----- */
function makeBag(){
  const NU=160, NV=190;
  const W=104, H=124;          // ancho (X), alto (Y) de la bolsa
  const R=14;                  // radio de la pieza
  const halfLen=35;            // media longitud de la pieza
  const sstep=(a,b,x)=>{x=Math.min(1,Math.max(0,(x-a)/(b-a)));return x*x*(3-2*x);};

  function wrinkle(u,v){
    return 0.55*Math.sin(0.07*u + 0.5)
         + 0.45*Math.sin(0.05*v - 0.8)
         + 0.30*Math.sin(0.11*u + 0.09*v)
         + 0.20*Math.sin(0.16*v + 1.7);
  }
  // semialtura del "colchón": bordes sellados (0) y bulto central por la pieza
  function halfH(u,v){
    const au=Math.abs(u), av=Math.abs(v);
    const edge=(1-sstep(W/2-9, W/2, au))*(1-sstep(H/2-9, H/2, av));
    if(edge<=0) return 0;
    const xPres=1 - sstep(halfLen+1, halfLen+9, au);   // dónde está la pieza
    const rr=R*R - v*v;
    const yProf=rr>0 ? Math.sqrt(rr) : 0;
    const bulge=xPres*yProf;                           // sección del cilindro
    const gap=xPres*2.2*(1 - sstep(R, R+7, av));        // holgura sobre la pieza
    const film=0.9;                                    // separación base del film
    const w=wrinkle(u,v)*(0.6 + 0.8*(1-xPres));         // más arrugas donde está flojo
    return Math.max(0, edge*(film + bulge + gap + w));
  }

  const pos=[], idx=[];
  for(let s=0;s<2;s++){                 // cara frontal (z+) y trasera (z-)
    const sign=s===0?1:-1;
    const base=pos.length/3;
    for(let j=0;j<=NV;j++){
      const v=-H/2 + H*(j/NV);
      for(let i=0;i<=NU;i++){
        const u=-W/2 + W*(i/NU);
        pos.push(u, v, sign*halfH(u,v));
      }
    }
    const row=NU+1;
    for(let j=0;j<NV;j++){
      for(let i=0;i<NU;i++){
        const a=base+j*row+i, b=a+1, c=a+row, d=c+1;
        if(sign>0) idx.push(a,c,b, b,c,d);
        else       idx.push(a,b,c, b,d,c);   // winding invertido en la cara trasera
      }
    }
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  geo.setIndex(idx);
  geo.computeVertexNormals();

  const mat=new THREE.MeshPhysicalMaterial({
    color:0xffffff, metalness:0.0, roughness:0.07,
    transmission:0.96, thickness:1.5, ior:1.46,
    clearcoat:1.0, clearcoatRoughness:0.06,
    attenuationColor:0xeef5f2, attenuationDistance:220,
    transparent:true, opacity:1.0, side:THREE.DoubleSide,
    envMapIntensity:1.5
  });
  const bagMesh=new THREE.Mesh(geo, mat);
  bagMesh.castShadow=true;

  // accesorios: orificio para colgar + tira adhesiva (agrupados)
  const group=new THREE.Group();
  const ring=new THREE.Mesh(
    new THREE.TorusGeometry(5.5, 1.1, 12, 48),
    new THREE.MeshStandardMaterial({color:0xb7bec5, metalness:0.25, roughness:0.6})
  );
  ring.position.set(0, H/2-13, 0);
  group.add(ring);

  const seal=new THREE.Mesh(
    new THREE.PlaneGeometry(W-16, 6),
    new THREE.MeshPhysicalMaterial({
      color:0xffffff, roughness:0.4, transmission:0.55,
      transparent:true, opacity:0.45, side:THREE.DoubleSide
    })
  );
  seal.position.set(0, H/2-27, 1.5);
  group.add(seal);

  return {bag:bagMesh, band:group};
}

/* ---------------- Órbita manual ---------------- */
function bindControls(){
  const el=renderer.domElement;

  // En modo compacto (tarjetas): solo autogiro, sin capturar arrastre/zoom/clic.
  if(COMPACT){ autoRotate=true; return; }

  let dragging=false, lastX=0, lastY=0;
  let pinchDist=0;

  el.addEventListener('pointerdown', e=>{
    dragging=true; lastX=e.clientX; lastY=e.clientY; autoRotate=false; syncRotBtn();
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const dx=e.clientX-lastX, dy=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY;
    camGoal.theta -= dx*0.006;
    camGoal.phi   -= dy*0.006;
    camGoal.phi = Math.max(0.18, Math.min(2.95, camGoal.phi));
  });
  el.addEventListener('pointerup', ()=>dragging=false);
  el.addEventListener('pointercancel', ()=>dragging=false);

  el.addEventListener('wheel', e=>{
    e.preventDefault();
    camGoal.r *= (1 + Math.sign(e.deltaY)*0.08);
    camGoal.r = Math.max(120, Math.min(420, camGoal.r));
  }, {passive:false});

  // pellizco táctil
  el.addEventListener('touchstart', e=>{
    if(e.touches.length===2){
      pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                           e.touches[0].clientY-e.touches[1].clientY);
    }
  }, {passive:true});
  el.addEventListener('touchmove', e=>{
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                         e.touches[0].clientY-e.touches[1].clientY);
      if(pinchDist){ camGoal.r *= pinchDist/d; camGoal.r=Math.max(120,Math.min(420,camGoal.r)); }
      pinchDist=d;
    }
  }, {passive:true});

  document.getElementById('btnBag').addEventListener('click', e=>{
    const v=!bag.visible; bag.visible=v; band.visible=v;
    e.currentTarget.classList.toggle('off', !v);
  });
  document.getElementById('btnRot').addEventListener('click', ()=>{ autoRotate=!autoRotate; syncRotBtn(); });
  document.getElementById('btnReset').addEventListener('click', ()=>{
    camGoal.r=CAM_DEFAULT.r; camGoal.theta=CAM_DEFAULT.theta; camGoal.phi=CAM_DEFAULT.phi;
  });
  function syncRotBtn(){ document.getElementById('btnRot').classList.toggle('off', !autoRotate); }
}

/* ---------------- Loop ---------------- */
function animate(){
  requestAnimationFrame(animate);
  if(autoRotate) camGoal.theta += 0.0024;

  // suavizado
  cam.r    += (camGoal.r-cam.r)*0.12;
  cam.theta+= (camGoal.theta-cam.theta)*0.15;
  cam.phi  += (camGoal.phi-cam.phi)*0.15;

  const sp=cam.phi, st=cam.theta, r=cam.r;
  camera.position.set(
    target.x + r*Math.sin(sp)*Math.sin(st),
    target.y + r*Math.cos(sp),
    target.z + r*Math.sin(sp)*Math.cos(st)
  );
  camera.lookAt(target);
  renderer.render(scene, camera);
}

function onResize(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
