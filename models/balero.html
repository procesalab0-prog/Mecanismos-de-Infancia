<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Balero — modelo 3D (set de 2 piezas)</title>
<style>
  :root{ --panel:rgba(16,21,28,.78); --line:rgba(255,255,255,.12); --txt:#e9eef3; --accent:#7fd1c7; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:transparent;
    font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--txt)}
  #app{position:fixed;inset:0} canvas{display:block;touch-action:none}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:10;
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  body.compact .controls{display:none}
  button{font-family:inherit;font-size:11.5px;color:var(--txt);background:var(--panel);
    border:1px solid var(--line);border-radius:999px;padding:9px 14px;cursor:pointer;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:.15s}
  button:hover{border-color:var(--accent);color:#fff}
  button.off{opacity:.55}
  .badge{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:6px;vertical-align:middle}
  button.off .badge{background:#5a6470}
</style>
</head>
<body>
<div id="app"></div>
<div class="controls">
  <button id="btnBag"><span class="badge"></span>Bolsa</button>
  <button id="btnRot"><span class="badge"></span>Girar</button>
  <button id="btnReset">Reiniciar vista</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   Balero (set de 2 piezas) en bolsa de celofán — Three.js r128
   Las dos piezas comparten una misma bolsa, apiladas verticalmente.
   Embebible: fondo transparente + modo compacto (?mode=compact)
   ============================================================ */

const PARAMS = new URLSearchParams(location.search);
const COMPACT = PARAMS.get('mode') === 'compact';
if (COMPACT) document.body.classList.add('compact');

const app = document.getElementById('app');
let renderer, scene, camera, bag, band, ground, envRTtex;

// --- segunda pieza (boquilla/brida) ---
const S2 = 20;
const Atot = 4.10;
const Lhalf2 = Atot*S2/2;
const PROF2 = [
  [0.00,0.50],[3.00,0.50],[3.02,0.62],[3.14,0.62],[3.20,0.36],
  [3.45,0.36],[3.70,0.33],[4.00,0.27],[4.10,0.20]
];

// --- primera pieza (cilindro roscado) ---
const R1 = 14, HL1 = 35;

// --- posición vertical de cada pieza dentro de la bolsa ---
const CY1 = 17;    // primera pieza, arriba
const CY2 = -18;   // segunda pieza, abajo

const target = new THREE.Vector3(0, 0, 0);
const cam = { r:275, theta:0.18, phi:1.28 };
const camGoal = { r:275, theta:0.18, phi:1.28 };
const CAM_DEFAULT = { r:275, theta:0.18, phi:1.28 };
let autoRotate = true;

init(); buildScene(); animate();

function init(){
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x000000, 0);                 // transparente: deja ver el bloque de color de la tienda
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.12;
  renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  app.appendChild(renderer.domElement);
  scene = new THREE.Scene(); scene.background = null;
  camera = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, 1, 4000);
  const pmrem = new THREE.PMREMGenerator(renderer); pmrem.compileEquirectangularShader();
  const envTex = new THREE.CanvasTexture(makeEnvCanvas());
  envTex.mapping = THREE.EquirectangularReflectionMapping;
  envRTtex = pmrem.fromEquirectangular(envTex).texture; scene.environment = envRTtex; envTex.dispose();
  addLights(); addEventListener('resize', onResize); bindControls();
}
function addLights(){
  scene.add(new THREE.HemisphereLight(0xffffff, 0x3a4150, 0.55));
  const key=new THREE.DirectionalLight(0xffffff,2.0); key.position.set(70,150,180); key.castShadow=true;
  key.shadow.mapSize.set(2048,2048); key.shadow.camera.near=40; key.shadow.camera.far=600;
  const d=120; key.shadow.camera.left=-d;key.shadow.camera.right=d;key.shadow.camera.top=d;key.shadow.camera.bottom=-d;
  key.shadow.bias=-0.0004; key.shadow.radius=6; scene.add(key);
  const fill=new THREE.DirectionalLight(0xcdd9ff,0.6); fill.position.set(-120,60,-40); scene.add(fill);
  const g1=new THREE.PointLight(0xffffff,0.8,800); g1.position.set(-60,120,90); scene.add(g1);
  const g2=new THREE.PointLight(0xfff3e0,0.6,800); g2.position.set(70,-10,120); scene.add(g2);
}
function makeEnvCanvas(){
  const c=document.createElement('canvas');c.width=1024;c.height=512;const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,512);
  g.addColorStop(0,'#cdd6e0');g.addColorStop(.5,'#9aa6b4');g.addColorStop(1,'#566173');
  ctx.fillStyle=g;ctx.fillRect(0,0,1024,512);
  const blob=(x,y,r,a)=>{const rg=ctx.createRadialGradient(x,y,0,x,y,r);
    rg.addColorStop(0,`rgba(255,255,255,${a})`);rg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();};
  blob(250,120,150,.9);blob(720,90,120,.8);blob(520,260,90,.5);blob(880,300,110,.6);return c;
}

function buildScene(){
  const matMetal = ()=>new THREE.MeshStandardMaterial({
    color:0xc9cdd2, metalness:0.9, roughness:0.28, envMapIntensity:1.15, side:THREE.DoubleSide
  });
  const p1 = makePieceNiple(matMetal()); p1.position.y = CY1; scene.add(p1);
  const p2 = makePieceBoquilla(matMetal()); p2.position.y = CY2; scene.add(p2);

  const b = makeBag(); bag=b.bag; band=b.band; scene.add(bag); scene.add(band);
  ground=new THREE.Mesh(new THREE.PlaneGeometry(1400,1400), new THREE.ShadowMaterial({opacity:0.22}));
  ground.rotation.x=-Math.PI/2; ground.position.y=-60; ground.receiveShadow=true; scene.add(ground);
}

/* ----- Primera pieza: cilindro roscado ----- */
function makePieceNiple(mat){
  const Rc=14.0, Rr=12.2, pitch=3.4;
  const pts=[];
  pts.push(new THREE.Vector2(0.0,69.0));
  pts.push(new THREE.Vector2(0.9,70.0));
  pts.push(new THREE.Vector2(13.0,70.0));
  pts.push(new THREE.Vector2(14.0,69.2));
  let y=69.2;
  while(y>6.0){ pts.push(new THREE.Vector2(Rr,y-pitch*0.5)); pts.push(new THREE.Vector2(Rc,y-pitch)); y-=pitch; }
  pts.push(new THREE.Vector2(14.0,4.0));
  pts.push(new THREE.Vector2(14.0,1.0));
  pts.push(new THREE.Vector2(13.0,0.0));
  pts.push(new THREE.Vector2(9.8,0.0));
  pts.push(new THREE.Vector2(9.6,0.6));
  pts.push(new THREE.Vector2(9.5,11.0));
  pts.push(new THREE.Vector2(3.2,14.5));
  pts.push(new THREE.Vector2(1.0,12.5));
  pts.push(new THREE.Vector2(0.0,8.5));
  const geo=new THREE.LatheGeometry(pts, 160);
  geo.translate(0,-35,0); geo.rotateZ(Math.PI/2); geo.computeVertexNormals();
  const m=new THREE.Mesh(geo,mat); m.castShadow=true; m.receiveShadow=true; return m;
}

/* ----- Segunda pieza: cuerpo + brida + boquilla hueca ----- */
function makePieceBoquilla(mat){
  const pt=(r,a)=>new THREE.Vector2(r*S2, a*S2);
  const P=[
    pt(0.00,-0.03), pt(0.05,0.00),
    pt(0.50,0.00),
    pt(0.50,3.00),
    pt(0.62,3.04), pt(0.62,3.14),
    pt(0.40,3.18), pt(0.36,3.22),
    pt(0.36,3.45),
    pt(0.33,3.70), pt(0.27,4.00),
    pt(0.24,4.07), pt(0.20,4.10),
    pt(0.16,4.08),
    pt(0.13,3.95), pt(0.09,3.60),
    pt(0.00,3.45)
  ];
  const geo=new THREE.LatheGeometry(P, 220);
  geo.translate(0,-Lhalf2,0); geo.rotateZ(-Math.PI/2); geo.computeVertexNormals();
  const m=new THREE.Mesh(geo,mat); m.castShadow=true; m.receiveShadow=true; return m;
}

// radio exterior de la 2da pieza (mundo) en función de la posición axial u
function pr2(u){
  let a=(u + Lhalf2)/S2; a=Math.min(Atot, Math.max(0, a));
  if(a<=PROF2[0][0]) return PROF2[0][1]*S2;
  for(let i=1;i<PROF2.length;i++){ if(a<=PROF2[i][0]){
    const [a0,r0]=PROF2[i-1], [a1,r1]=PROF2[i]; const t=(a-a0)/(a1-a0); return (r0+(r1-r0)*t)*S2; } }
  return PROF2[PROF2.length-1][1]*S2;
}

/* ----- Bolsa plana de celofán que envuelve LAS DOS piezas ----- */
function makeBag(){
  const NU=190, NV=180;
  const W=120, H=116;
  const sstep=(a,b,x)=>{x=Math.min(1,Math.max(0,(x-a)/(b-a)));return x*x*(3-2*x);};
  function wrinkle(u,v){
    return 0.55*Math.sin(0.07*u+0.5)+0.45*Math.sin(0.05*v-0.8)
         +0.30*Math.sin(0.11*u+0.09*v)+0.20*Math.sin(0.16*v+1.7);
  }
  function halfH(u,v){
    const au=Math.abs(u), av=Math.abs(v);
    const edge=(1-sstep(W/2-9,W/2,au))*(1-sstep(H/2-9,H/2,av));
    if(edge<=0) return 0;
    // pieza 1 (cilindro R1) centrada en CY1
    const xP1=1-sstep(HL1+1,HL1+9,au);
    const d1=v-CY1; const rr1=R1*R1-d1*d1; const yp1=rr1>0?Math.sqrt(rr1):0; const b1=xP1*yp1;
    const g1=xP1*2.2*(1-sstep(R1,R1+7,Math.abs(d1)));
    // pieza 2 (perfil pr2) centrada en CY2
    const xP2=1-sstep(Lhalf2+1,Lhalf2+7,au);
    const rp2=pr2(u); const d2=v-CY2; const rr2=rp2*rp2-d2*d2; const yp2=rr2>0?Math.sqrt(rr2):0; const b2=xP2*yp2;
    const g2=xP2*2.0*(1-sstep(rp2,rp2+6,Math.abs(d2)));
    const bulge=Math.max(b1,b2);
    const gap=Math.max(g1,g2);
    const film=0.9;
    const w=wrinkle(u,v)*(0.6+0.8*(1-Math.max(xP1,xP2)));
    return Math.max(0, edge*(film+bulge+gap+w));
  }
  const pos=[], idx=[];
  for(let s=0;s<2;s++){
    const sign=s===0?1:-1; const base=pos.length/3;
    for(let j=0;j<=NV;j++){ const v=-H/2+H*(j/NV);
      for(let i=0;i<=NU;i++){ const u=-W/2+W*(i/NU); pos.push(u,v,sign*halfH(u,v)); } }
    const row=NU+1;
    for(let j=0;j<NV;j++) for(let i=0;i<NU;i++){
      const a=base+j*row+i,b=a+1,c=a+row,d=c+1;
      if(sign>0) idx.push(a,c,b,b,c,d); else idx.push(a,b,c,b,d,c);
    }
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  geo.setIndex(idx); geo.computeVertexNormals();
  const mat=new THREE.MeshPhysicalMaterial({
    color:0xffffff, metalness:0, roughness:0.07, transmission:0.96, thickness:1.5, ior:1.46,
    clearcoat:1.0, clearcoatRoughness:0.06, attenuationColor:0xeef5f2, attenuationDistance:220,
    transparent:true, opacity:1.0, side:THREE.DoubleSide, envMapIntensity:1.5
  });
  const bagMesh=new THREE.Mesh(geo,mat); bagMesh.castShadow=true;

  const group=new THREE.Group();
  const ring=new THREE.Mesh(new THREE.TorusGeometry(5.5,1.1,12,48),
    new THREE.MeshStandardMaterial({color:0xb7bec5,metalness:0.25,roughness:0.6}));
  ring.position.set(0,H/2-13,0); group.add(ring);
  const seal=new THREE.Mesh(new THREE.PlaneGeometry(W-16,6),
    new THREE.MeshPhysicalMaterial({color:0xffffff,roughness:0.4,transmission:0.55,transparent:true,opacity:0.45,side:THREE.DoubleSide}));
  seal.position.set(0,H/2-27,1.5); group.add(seal);
  return {bag:bagMesh, band:group};
}

/* ----- Órbita manual ----- */
function bindControls(){
  const el=renderer.domElement;
  if(COMPACT){ autoRotate=true; return; }   // tarjetas: solo autogiro, sin capturar scroll/clic

  let drag=false,lx=0,ly=0,pinch=0;
  el.addEventListener('pointerdown',e=>{drag=true;lx=e.clientX;ly=e.clientY;autoRotate=false;syncRot();el.setPointerCapture(e.pointerId);});
  el.addEventListener('pointermove',e=>{if(!drag)return;
    camGoal.theta-=(e.clientX-lx)*0.006;camGoal.phi-=(e.clientY-ly)*0.006;
    camGoal.phi=Math.max(0.18,Math.min(2.95,camGoal.phi));lx=e.clientX;ly=e.clientY;});
  el.addEventListener('pointerup',()=>drag=false); el.addEventListener('pointercancel',()=>drag=false);
  el.addEventListener('wheel',e=>{e.preventDefault();camGoal.r*=(1+Math.sign(e.deltaY)*0.08);camGoal.r=Math.max(120,Math.min(420,camGoal.r));},{passive:false});
  el.addEventListener('touchstart',e=>{if(e.touches.length===2)pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:true});
  el.addEventListener('touchmove',e=>{if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(pinch){camGoal.r*=pinch/d;camGoal.r=Math.max(120,Math.min(420,camGoal.r));}pinch=d;}},{passive:true});
  document.getElementById('btnBag').addEventListener('click',e=>{const v=!bag.visible;bag.visible=v;band.visible=v;e.currentTarget.classList.toggle('off',!v);});
  document.getElementById('btnRot').addEventListener('click',()=>{autoRotate=!autoRotate;syncRot();});
  document.getElementById('btnReset').addEventListener('click',()=>{camGoal.r=CAM_DEFAULT.r;camGoal.theta=CAM_DEFAULT.theta;camGoal.phi=CAM_DEFAULT.phi;});
  function syncRot(){document.getElementById('btnRot').classList.toggle('off',!autoRotate);}
}
function animate(){
  requestAnimationFrame(animate);
  if(autoRotate) camGoal.theta+=0.0024;
  cam.r+=(camGoal.r-cam.r)*0.12; cam.theta+=(camGoal.theta-cam.theta)*0.15; cam.phi+=(camGoal.phi-cam.phi)*0.15;
  camera.position.set(
    target.x+cam.r*Math.sin(cam.phi)*Math.sin(cam.theta),
    target.y+cam.r*Math.cos(cam.phi),
    target.z+cam.r*Math.sin(cam.phi)*Math.cos(cam.theta));
  camera.lookAt(target); renderer.render(scene,camera);
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
</script>
<script src="viewer-extras.js"></script>
</body>
</html>
